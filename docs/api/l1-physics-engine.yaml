openapi: 3.1.0
info:
  title: L1 Physics Engine API
  version: 1.0.0
  description: The Green Audit engine for energy variance validation.
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
# L1 primarily uses PostgreSQL LISTEN/NOTIFY and Kafka, but could expose an audit API
components:
  schemas:
    PhysicsAlert:
      type: object
      properties:
        event_type: { type: string }
        session_id: { type: string, format: uuid }
        site_id: { type: string }
        efficiency_pct: { type: number }
        threshold: { type: number }
        timestamp: { type: string, format: date-time }
        source_layer: { type: string, default: L1 }
