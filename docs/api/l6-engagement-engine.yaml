openapi: 3.1.0
info:
  title: L6 Engagement Engine API
  version: 4.1.0
  description: Gamification, leaderboards, and driver engagement.
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /leaderboard:
    get:
      summary: Get fleet leaderboard
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Leaderboard data
  /achievements:
    get:
      summary: Get all available achievements
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of achievements
  /achievements/driver/{driver_id}:
    get:
      summary: Get driver's earned achievements
      security:
        - BearerAuth: []
      parameters:
        - name: driver_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Driver achievements
  /challenges/active:
    get:
      summary: Get active engagement challenges
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of challenges
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
